<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>pay.e.cash Test Links</title>
        <link rel="stylesheet" href="./styles.css" />
    </head>
    <body>
        <main class="card">
            <h1>Router Test Page</h1>
            <!--
                This page is intended for broader manual QA scenarios.
                Keep more extensive test links here if they are too verbose for the main landing page.
            -->
            <p>Open a link or copy it with the clipboard button.</p>
            <ul id="links" class="test-links"></ul>
        </main>
        <script src="./clipboard.js"></script>
        <script>
            const linksEl = document.getElementById('links');
            const base = `${window.location.origin}`;

            const asPayUrl = bip21 => `${base}/?bip21=${bip21}`;

            // Keep the canonical expanded example list here, even if the landing page
            // only surfaces a subset of scenarios.
            const examples = [
                {
                    label: 'Simple XEC send',
                    description: 'Prepared XEC send with amount',
                    url: asPayUrl(
                        'ecash:prfhcnyqnl5cgrnmlfmms675w93ld7mvvqd0y8lz07?amount=12.34',
                    ),
                },
                {
                    label: 'XEC send with op_return_raw',
                    description: 'Prepared XEC send with OP_RETURN payload',
                    url: asPayUrl(
                        'ecash:prfhcnyqnl5cgrnmlfmms675w93ld7mvvqd0y8lz07?amount=17&op_return_raw=0400746162',
                    ),
                },
                {
                    label: 'Token send',
                    description:
                        'Prepared token send with token_id and token qty',
                    url: asPayUrl(
                        'ecash:prfhcnyqnl5cgrnmlfmms675w93ld7mvvqd0y8lz07?token_id=0387947fd575db4fb19a3e322f635dec37fd192b5941625b66bc4b2c3008cbf0&token_decimalized_qty=1',
                    ),
                },
            ];

            examples.forEach(example => {
                const { url } = example;
                const li = document.createElement('li');
                li.className = 'test-link-row';

                const textCtn = document.createElement('div');
                textCtn.className = 'test-link-text';

                const title = document.createElement('strong');
                title.textContent = example.label;
                textCtn.appendChild(title);

                const desc = document.createElement('div');
                desc.textContent = example.description;
                textCtn.appendChild(desc);

                const actions = document.createElement('div');
                actions.className = 'test-link-actions';

                const openLink = document.createElement('a');
                openLink.href = url;
                openLink.className = 'open-url-link';
                openLink.textContent = 'Open';
                openLink.setAttribute(
                    'aria-label',
                    `Open URL for ${example.label}`,
                );

                const copyButton = document.createElement('button');
                copyButton.type = 'button';
                copyButton.className = 'copy-url-btn';
                copyButton.title = 'Copy URL';
                copyButton.setAttribute(
                    'aria-label',
                    `Copy URL for ${example.label}`,
                );
                copyButton.textContent = '📋';
                copyButton.addEventListener('click', async () => {
                    try {
                        await window.copyTextToClipboard(url);
                        copyButton.classList.add('copied');
                        setTimeout(() => {
                            copyButton.classList.remove('copied');
                        }, 1000);
                    } catch {
                        /* Tooltip already absent on failure */
                    }
                });

                actions.appendChild(openLink);
                actions.appendChild(copyButton);

                li.appendChild(textCtn);
                li.appendChild(actions);
                linksEl.appendChild(li);
            });
        </script>
    </body>
</html>
